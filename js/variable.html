<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS</title>
  </head>
  <body>
    <script>
      let x = 10;
      let y = 5;
      let name = "Ram";
      let age = 31;
      age = 40;

      document.write("Value of x:" + x);
      document.write("<br>Value of y:" + y);
      document.write("<br>Sum of x and y: " + (x + y));
      document.write("<br>My name is: " + name);
      document.write("<br>I'm " + age + " years old.");

      const pi = 3.14;
      //   pi = 4;
      document.write("<br>Value of pi: " + pi);

      let isActive = true;
      let isLoggedIn = false; // Boolean values\
      document.write("<br>Is user active? " + isActive);
      document.write("<br>Is user logged in? " + isLoggedIn);
    </script>
  </body>
</html>
