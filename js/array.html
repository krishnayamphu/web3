<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS</title>
  </head>
  <body>
    <script>
      const num = [10, 20, 30];

      document.writeln(num[0]);
      document.writeln("<hr>");
      for (let i = 0; i < 3; i++) {
        document.writeln(num[i] + ", ");
      }

      const color = new Array("red", "green", "blue");
      for (let i = 0; i < 3; i++) {
        document.writeln("<br>color: " + color[i]);
      }
    </script>
  </body>
</html>
