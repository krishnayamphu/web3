<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS</title>
  </head>
  <body>
    <script>
      let x = 15;
      let y = 5;
      x--;
      y += 4;

      document.write(x);
      document.write("<br>" + (21 % 5));
      document.write("<br>" + y);
      document.write("<br>" + (y > x));

      let math = 65;
      let eng = 60;
      document.write("<br>" + (math > 40 && eng > 40));
      document.write("<br>" + (x > y ? "x is greater" : "y is greater"));
    </script>
  </body>
</html>
