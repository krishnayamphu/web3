<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      .dialog-overlay {
        background-color: rgba(0, 0, 0, 0.8);
        width: 100%;
        height: 100vh;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
        display: none;
      }
      .dialog {
        width: 80%;
        background-color: white;
        padding: 15px;
      }
    </style>
  </head>
  <body>
    <button onclick="openDaialog()">Open Dialog</button>
    <div class="dialog-overlay" id="dialogOverlay">
      <div class="dialog">
        <button onclick="closeDaialog()">Close</button>
        <h2>Dialog Title</h2>
        <p>
          Lorem ipsum, dolor sit amet consectetur adipisicing elit. Delectus
          eligendi perferendis repudiandae labore explicabo quisquam aut fugit
          rem quis sunt ipsum, reiciendis illo dolores? Tempore impedit officia
          optio quam ipsa!
        </p>
      </div>
    </div>

    <script>
      function openDaialog() {
        document.getElementById("dialogOverlay").style.display = "flex";
      }
      function closeDaialog() {
        document.getElementById("dialogOverlay").style.display = "none";
      }
    </script>
  </body>
</html>
