<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navigation</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      nav {
        background-color: rgb(33, 102, 206);
        width: 80%;
        margin: 15px auto;
      }
      nav a {
        display: inline-block;
        text-decoration: none;
        padding: 10px 20px;
        color: white;
        transition: all 0.5s ease;
      }
      nav a:hover {
        background-color: orangered;
      }
      nav a.active {
        background-color: orangered;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="#" class="active">Home</a>
      <a href="#">Blog</a>
      <a href="#">Portfolio</a>
      <a href="#">Gallery</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </body>
</html>
