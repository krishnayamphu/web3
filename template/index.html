<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      rel="icon"
      href="/images/favicon.ico"
      type="image/x-icon"
      sizes="16x16"
    />
    <!-- bootstrap icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!-- bootstrap css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <!-- user css -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <!-- .top-header -->
      <div class="top-header bg-light">
        <div class="container">
          <div
            class="d-flex justify-content-center justify-content-lg-between align-items-center"
          >
            <div class="">Super Value Deals - Save more with coupons</div>
            <div class="dropdown d-none d-lg-block">
              <button
                class="btn dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <img src="images/english.svg" alt="" />
                English
              </button>
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="#">
                    <img src="images/english.svg" alt="" /> English
                  </a>
                </li>
                <li>
                  <a class="dropdown-item" href="#">
                    <img src="images/deutsch.svg" alt="" /> Deutsch
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
      <!-- logo,search,cart -->
      <div class="container py-4">
        <div class="row">
          <div class="col-lg-2">
            <a href="#"><img src="images/freshcart-logo.svg" alt="" /></a>
          </div>
          <div class="col"></div>
          <div class="col"></div>
          <div class="col-lg-2">
            <div class="d-flex gap-4">
              <a class="position-relative" href="">
                <i class="bi bi-heart"></i>
                <span
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success"
                >
                  4
                  <span class="visually-hidden">unread messages</span>
                </span>
              </a>
              <a href="#">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </a>
              <a class="position-relative" href="">
                <i class="bi bi-bag"></i>
                <span
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success"
                >
                  4
                  <span class="visually-hidden">unread messages</span>
                </span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- bootstrap js -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
