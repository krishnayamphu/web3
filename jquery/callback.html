<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery</title>
    <style>
      p {
        background-color: aquamarine;
        padding: 15px;
      }
    </style>
  </head>
  <body>
    <button id="btn1">SlideUp</button>
    <p>
      Lorem ipsum dolor sit amet consectetur, adipisicing elit. Deserunt cum quo
      beatae saepe dolorem assumenda totam unde quisquam consequatur omnis sunt
      et enim reprehenderit, at dicta laudantium numquam eum necessitatibus.
    </p>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        //hide paragraph
        $("#btn1").click(function () {
          $("p").slideUp(5000, function () {
            alert("Hide completed");
          });
        });
      });
    </script>
  </body>
</html>
