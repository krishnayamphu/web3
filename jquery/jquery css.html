<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery</title>
  </head>
  <body>
    <button id="btn1">Apply CSS</button>
    <p>
      Lorem ipsum dolor sit amet consectetur, adipisicing elit. Deserunt cum quo
      beatae saepe dolorem assumenda totam unde quisquam consequatur omnis sunt
      et enim reprehenderit, at dicta laudantium numquam eum necessitatibus.
    </p>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#btn1").click(function () {
          $("p").css({
            color: "yellow",
            "background-color": "blue",
            padding: "15px",
          });
        });
      });
    </script>
  </body>
</html>
