<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      * {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      nav {
        background-color: rgb(2, 2, 2);
        padding: 5px 15px;
      }
      .offset {
        position: fixed;
        background-color: rgba(0, 0, 0, 0.484);
        display: flex;
        width: 100%;
        min-height: calc(100vh - 32.5px);
      }
      .offset .offset-content {
        background-color: white;
        padding: 15px;
      }
      .d-none {
        display: none;
      }
    </style>
  </head>
  <body>
    <nav>
      <button id="btn1"><i class="bi bi-list"></i></button>
      <button id="btn2"><i class="bi bi-x-lg"></i></button>
    </nav>

    <div class="offset">
      <div class="offset-content">content</div>
    </div>

    <main>
      <h1>Hello World</h1>
      <p>
        Lorem ipsum dolor sit, amet consectetur adipisicing elit. Natus enim
        minus porro beatae laborum quam dolor ipsum mollitia nam et. Architecto
        recusandae veniam, iusto nemo sit ab vitae assumenda quis.
      </p>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#btn1").click(function () {
          $(".offset").removeClass("d-none");
        });

        $("#btn2").click(function () {
          $(".offset").addClass("d-none");
        });
      });
    </script>
  </body>
</html>
