<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      .box {
        width: 200px;
        height: 150px;
        background-color: red;
      }
    </style>
  </head>
  <body>
    <nav>
      <button id="btn1">width</button>
      <button id="btn2">height</button>
    </nav>
    <br />
    <div class="box">Box</div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#btn1").click(function () {
          let w = $(".box").width();
          alert(w);
        });

        $("#btn2").click(function () {
          let h = $(".box").height();
          alert(h);
        });
      });
    </script>
  </body>
</html>
