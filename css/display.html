<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: pink;

        display: inline;
      }

      span {
        background-color: aquamarine;
        width: 100px;
        height: 50px;
        display: block;
        margin: 5px;
      }
      a {
        width: 100px;
        height: 40px;
        background-color: tomato;
        display: inline-block;
        text-align: center;
        text-decoration: none;
        line-height: 40px;
      }
      p {
        display: none;
      }
    </style>
  </head>
  <body>
    <div>box1</div>
    <div>box2</div>
    <hr />
    <span>inline1</span>
    <span>inline2</span>
    <hr />
    <a href="#">Link 1</a>
    <a href="#">Link 2</a>
    <hr />
    <h1>Hello World</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Asperiores ab
      inventore impedit ipsum eius, voluptate ullam temporibus, laboriosam
      reprehenderit natus iusto minus accusantium dolorum saepe, sunt officia
      provident odit quae.
    </p>
  </body>
</html>
