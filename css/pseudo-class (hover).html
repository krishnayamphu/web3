<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      .box {
        width: 200px;
        height: 100px;
        background-color: red;
        margin: 15px;
      }
      .box:hover {
        background-color: blue;
        border-radius: 25px;
      }
      h1:hover {
        font-size: 50px;
      }
      p:hover {
        background-color: yellow;
        color: blue;
        padding: 15px;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <h1>Hello World</h1>
    <p>
      Lorem ipsum dolor sit amet, consectetur adipisicing elit. Placeat a,
      repudiandae dolorum suscipit voluptatum quis fugiat provident doloremque
      dolor minima numquam recusandae, corporis cumque eius veniam. Quisquam
      tempora libero molestiae.
    </p>
  </body>
</html>
