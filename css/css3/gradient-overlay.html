<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay</title>
    <style>
      div {
        width: 800px;
        height: 300px;
        margin: 15px auto;
        border: 1px solid red;
        background-size: cover;
      }
      h1 {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 50px;
        text-align: center;
        line-height: 300px;
        color: white;
      }

      .box1 {
        background-image: linear-gradient(
            rgba(255, 0, 0, 0.8),
            rgba(0, 0, 255, 0.8)
          ),
          url(bg.jpg);
      }
      .box2 {
        background-image: linear-gradient(
            rgba(0, 0, 0, 0.8),
            rgba(0, 0, 0, 0.8)
          ),
          url(bg.jpg);
      }
    </style>
  </head>
  <body>
    <div class="box1"><h1>Hello World</h1></div>
    <div class="box2"><h1>Hello World</h1></div>
  </body>
</html>
