<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: pink;
        margin: 15px;
        border: 1px solid red;
        position: relative;
        top: 0;
        transition-property: all;
        transition-duration: 1s;
        transition-timing-function: ease;
        transition-delay: 0s;
      }

      div:hover {
        top: 50px;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
  </body>
</html>
