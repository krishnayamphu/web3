<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      h1::before {
        content: open-quote;
      }
      h1::after {
        content: close-quote;
      }

      p::after {
        content: "more...";
      }
      h2::after {
        content: "👍";
      }
    </style>
  </head>
  <body>
    <h1>Hello World</h1>
    <p>
      Lorem, ipsum dolor sit amet consectetur adipisicing elit. Laborum deserunt
      quae fuga soluta nobis consectetur cupiditate, nesciunt, doloremque ipsum
      blanditiis reiciendis omnis aspernatur libero optio dolorum ex ducimus?
      Minima, nulla.
    </p>

    <h2>Namaste</h2>
    <h2>Namaste</h2>
    <h2>Namaste</h2>
  </body>
</html>
