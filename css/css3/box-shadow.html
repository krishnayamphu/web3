<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: pink;
        margin: 15px;
        float: left;
      }
      .box1 {
        box-shadow: 5px 5px 2px black;
      }
      .box2 {
        box-shadow: 5px -5px 2px 2px black;
      }
      .box3 {
        box-shadow: inset 0px 0px 10px black;
      }
      .box4 {
        background-color: white;
        box-shadow: 0px 0px 5px black;
      }
      .box5 {
        background-color: white;
        box-shadow: 0px 0px 5px rgb(255, 8, 8);
      }

      .box6 {
        background-color: white;
        box-shadow: 5px 5px 5px red, -5px -5px 5px blue;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
  </body>
</html>
