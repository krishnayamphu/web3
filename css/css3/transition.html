<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: pink;
        margin: 15px;
        float: left;
        border: 1px solid red;
        transition-property: all;
        transition-duration: 1s;
        transition-timing-function: ease;
        transition-delay: 0s;
      }
      .box1:hover {
        background-color: blue;
      }
      .box2:hover {
        border-radius: 30px;
      }

      h1 {
        transition: all 1s linear;
      }
      h1:hover {
        font-size: 60px;
        color: blue;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>

    <h1>Hello World</h1>
  </body>
</html>
